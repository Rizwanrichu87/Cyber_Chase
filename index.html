<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPERATION: NEON SHADOW - Cyberpunk Espionage Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #000000;
            color: #00ffff;
            overflow: hidden;
            height: 100vh;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink {
            50% { border-right-color: transparent; }
        }

        @keyframes glitch {
            0%, 100% { text-shadow: 0 0 5px #00ffff; }
            50% { text-shadow: 0 0 15px #ff0000, 0 0 5px #00ffff; }
        }

        .typing-text {
            display: inline-block;
            text-align: left;
            border-right: 2px solid #00ffff;
            white-space: pre-wrap;
            word-wrap: break-word;
            animation: blink 0.75s step-end infinite;
        }

        .header-bar {
            background: #0a001a;
            border-bottom: 2px solid #00ff00;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #00ffff;
            letter-spacing: 2px;
        }

        .time-display {
            font-size: 14px;
            padding: 5px 15px;
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #00ff00;
            border-radius: 3px;
        }

        .main-container {
            display: flex;
            height: calc(100vh - 45px);
        }

        .sidebar {
            width: 280px;
            background: #000000;
            border-right: 2px solid #00ffff;
            overflow-y: auto;
            padding: 15px;
        }

        .sidebar-item {
            padding: 12px;
            margin: 8px 0;
            background: rgba(0, 255, 0, 0.05);
            border: 1px solid #00ff00;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.3s;
            font-size: 13px;
        }

        .sidebar-item:hover {
            background: rgba(0, 255, 0, 0.2);
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        .sidebar-item.active {
            background: #00ff00;
            color: #000000;
            font-weight: bold;
        }

        .content-area {
            flex: 1;
            background: #000000;
            padding: 20px;
            overflow-y: auto;
            position: relative;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #0a001a;
            border: 2px solid #ff00ff;
            padding: 40px;
            border-radius: 10px;
            max-width: 900px;
            width: 90%;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.5);
            animation: slideIn 0.5s ease-out;
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-title {
            font-size: 32px;
            margin-bottom: 20px;
            text-shadow: 0 0 15px #00ff00;
            letter-spacing: 3px;
        }

        .modal-text {
            font-size: 16px;
            line-height: 1.8;
            margin: 20px 0;
        }

        .password-input {
            padding: 12px;
            margin: 20px 0;
            background: rgba(0, 255, 0, 0.05);
            border: 1px solid #00ff00;
            color: #00ffff;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            width: 100%;
            border-radius: 3px;
        }

        .password-input::placeholder {
            color: rgba(0, 255, 0, 0.5);
        }

        .btn {
            padding: 12px 30px;
            margin: 10px;
            background: rgba(0, 255, 0, 0.1);
            border: 2px solid #ff00ff;
            color: #00ffff;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            border-radius: 3px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: #00ff00;
            color: #000000;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.8);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .clue-box {
            margin: 20px 0;
            padding: 20px;
            background: rgba(0, 150, 200, 0.1);
            border-left: 4px solid #00ff00;
            border-radius: 3px;
            font-size: 14px;
            line-height: 1.8;
            text-align: left;
        }

        .suspect-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .suspect-card {
            background: #0a001a;
            border: 2px solid #ff00ff;
            border-radius: 5px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }

        .suspect-card:hover {
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.8);
            transform: translateY(-5px);
        }

        .suspect-card.eliminated {
            opacity: 0.5;
            border: 2px solid #ff0000;
        }

        .suspect-image {
            width: 100%;
            height: 200px;
            background: #0a001a;
            overflow: hidden;
            border-bottom: 2px solid #00ff00;
        }

        .suspect-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .suspect-info {
            padding: 15px;
            text-align: left;
        }

        .suspect-name {
            font-size: 18px;
            font-weight: bold;
            margin: 10px 0;
            color: #00ffff;
        }

        .suspect-role {
            font-size: 12px;
            color: rgba(0, 255, 0, 0.7);
            margin: 5px 0;
        }

        .suspect-status {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(0, 255, 0, 0.3);
            color: #00ffff;
            font-weight: bold;
            font-size: 12px;
        }

        .level-progress {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .level-badge {
            width: 50px;
            height: 50px;
            background: rgba(0, 255, 0, 0.1);
            border: 2px solid #ff00ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .level-badge.completed {
            background: #00ff00;
            color: #000000;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.8);
        }

        .level-badge.locked {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .alert {
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
            font-weight: bold;
            animation: pulse 0.5s;
        }

        .alert.success {
            background: rgba(0, 255, 0, 0.2);
            border: 2px solid #ff00ff;
            color: #00ffff;
        }

        .alert.error {
            background: rgba(255, 0, 0, 0.2);
            border: 2px solid #ff0000;
            color: #ff0000;
        }

        .alert.warning {
            background: rgba(255, 165, 0, 0.2);
            border: 2px solid #ffa500;
            color: #ffa500;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .cipher-display {
            background: rgba(0, 255, 0, 0.1);
            border: 2px solid #ff00ff;
            padding: 20px;
            border-radius: 5px;
            margin: 15px 0;
            font-family: 'Courier New', monospace;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 3px;
        }

        .hint-section {
            background: rgba(255, 165, 0, 0.1);
            border-left: 4px solid #ffa500;
            padding: 15px;
            margin: 15px 0;
            border-radius: 3px;
            font-size: 13px;
            color: #ffa500;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ffff;
        }

        h2 {
            font-size: 20px;
            margin: 20px 0 10px 0;
            color: #00ffff;
        }

        .timeline {
            margin: 20px 0;
            padding: 15px;
            background: rgba(0, 100, 200, 0.1);
            border-left: 4px solid #00ffff;
            border-radius: 3px;
            text-align: left;
        }

        .timestamp {
            font-weight: bold;
            color: #ffff00;
            margin: 10px 0;
        }

        .evidence-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .evidence-card {
            background: rgba(0, 100, 200, 0.1);
            border: 2px solid #00ffff;
            border-radius: 5px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
        }

        .evidence-card:hover {
            box-shadow: 0 0 15px rgba(0, 200, 255, 0.5);
            transform: translateY(-5px);
        }

        .evidence-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #00ffff;
        }

        .password-hint {
            margin-top: 15px;
            padding: 15px;
            background: rgba(255, 165, 0, 0.1);
            border: 1px solid #ffa500;
            border-radius: 3px;
            font-size: 12px;
            color: #ffa500;
            text-align: left;
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #000000;
        }

        ::-webkit-scrollbar-thumb {
            background: #00ff00;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #00cc00;
        }
    </style>
</head>
<body>
    <div class="header-bar">
        <div class="title">⚡ OPERATION: NEON SHADOW ⚡</div>
        <div class="time-display" id="timeDisplay">00:00:00</div>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <div style="margin-bottom: 20px; font-weight: bold; text-shadow: 0 0 5px #00ffff; font-size: 14px;">
                ➤ NAVIGATION MENU
            </div>
            <div class="sidebar-item active" onclick="showHome()">🏠 HOME</div>
            <div class="sidebar-item" onclick="showInvestigation()">🔍 INVESTIGATION</div>
            <div class="sidebar-item" onclick="showSuspects()">👥 SUSPECTS</div>
            <div class="sidebar-item" onclick="showLevels()">🔐 CIPHER LEVELS</div>
            <div class="sidebar-item" onclick="showEvidence()">📋 EVIDENCE LOG</div>
            <div class="sidebar-item" onclick="showTimeline()">⏱ TIMELINE</div>
            <div class="sidebar-item" onclick="showMegaPuzzle()">🔓 MEGA CIPHER</div>
        </div>

        <div class="content-area" id="contentArea">
            <!-- Content dynamically loaded -->
        </div>
    </div>

    <!-- INTRO MODAL -->
    <div class="modal active" id="introModal">
        <div class="modal-content">
            <div class="modal-title">⚠ CRITICAL BREACH DETECTED ⚠</div>
            <div class="modal-text" style="min-height: 180px;">
                <div class="typing-text" id="introTextContainer"></div>
            </div>
            <button class="btn" id="startBtn" onclick="startGame()" style="margin-top: 30px; font-size: 16px; display: none;">▶ BEGIN INVESTIGATION</button>
        </div>
    </div>

    <!-- PASSWORD MODAL -->
    <div class="modal" id="passwordModal">
        <div class="modal-content">
            <div class="modal-title" id="passwordTitle">🔐 ENCRYPTED FILE</div>
            <div id="passwordPrompt" class="modal-text"></div>
            <div id="cipherInfo"></div>
            <input type="text" class="password-input" id="passwordInput" placeholder="Enter decrypted password...">
            <div id="hintContainer" style="display: none; margin-top: 20px; padding: 15px; border: 1px solid #ffa500; border-radius: 3px; background: rgba(255, 165, 0, 0.05); text-align: left;">
                <div style="color: #ffa500; font-weight: bold; margin-bottom: 10px;">⚠ ADMIN AUTHENTICATION REQUIRED FOR HINTS ⚠</div>
                <input type="text" class="password-input" id="adminPasswordInput" placeholder="Enter Admin Password..." style="border-color: #ffa500; color: #ffa500; margin-top: 0; margin-bottom: 10px;">
                <button class="btn" onclick="unlockHint()" style="background: rgba(255, 165, 0, 0.1); border: 2px solid #ffa500; color: #ffa500; width: 100%; margin: 0;">UNLOCK NEXT HINT</button>
                <div id="adminFeedback" style="color: #ff0000; margin-top: 10px; font-size: 14px;"></div>
                <div id="hintTextDisplay" style="margin-top: 15px;"></div>
            </div>
            <div id="actionButtons" style="margin-top: 20px;">
                <button class="btn" onclick="checkPassword()">DECRYPT</button>
                <button class="btn" onclick="closePasswordModal()">CANCEL</button>
                <button class="btn" onclick="toggleHint()" style="background: rgba(255, 165, 0, 0.1); border: 2px solid #ffa500; color: #ffa500;">HINTS</button>
            </div>
            <div id="nextLevelContainer" style="display: none; margin-top: 20px;">
                <button class="btn" onclick="goToNextLevel()" style="background: rgba(0, 255, 0, 0.2); border: 2px solid #ff00ff; color: #00ffff; width: 100%;">VIEW CLEARED SUSPECTS ➡</button>
            </div>
            <div id="passwordFeedback" style="margin-top: 15px; min-height: 30px;"></div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
                        const introLines = [
                "The Genesis AI source code was stolen from OmniCorp's quantum vault.",
                "A sophisticated corporate spy has infiltrated the executive network.",
                "You have 5 suspects ranging from tech leads to executives.",
                "Your mission: Crack the encryption layers and find the thief.",
                "WARNING: The spy's identity remains completely obscured.",
                "Solve the final mega cipher to reveal the corporate traitor."
            ];
            
            const container = document.getElementById("introTextContainer");
            const btn = document.getElementById("startBtn");
            let currentLine = 0;
            let currentWord = 0;
            let words = introLines[currentLine].split(" ");
            
            const typeInterval = setInterval(() => {
                if (currentWord < words.length) {
                    container.textContent += (currentWord === 0 ? "" : " ") + words[currentWord];
                    currentWord++;
                } else {
                    currentLine++;
                    if (currentLine < introLines.length) {
                        words = introLines[currentLine].split(" ");
                        currentWord = 0;
                        container.textContent += "\n";
                    } else {
                        clearInterval(typeInterval);
                        btn.style.display = "inline-block";
                    }
                }
            }, 100);
        });

        const gameState = {
            currentLevel: 0,
            completedLevels: [],
            unlockedFiles: [],
            eliminatedSuspects: [],
            gameStarted: false,
            finalRevealed: false,
            hintsUsed: []
        };

                const characters = {
            0: {
                name: "NOVA BLACK",
                role: "Lead AI Architect",
                dept: "Quantum Research",
                image: "https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?w=500&auto=format&fit=crop&q=60", 
                desc: "Brilliant but obsessive. Created the Genesis AI.",
                eliminated: false,
                reason: "Livestreaming a keynote address during the exact time of the breach"
            },
            1: {
                name: "ELIAS VANCE",
                role: "Head of Security",
                dept: "Corporate Defense",
                image: "https://images.unsplash.com/photo-1560250097-0b93528c311a?w=500&auto=format&fit=crop&q=60",
                desc: "Ex-military. Designing the quantum vault's physical security.",
                eliminated: false,
                reason: "Cybernetics biometrics prove he was unconscious in the medical bay during the breach"
            },
            2: {
                name: "LYRA VANCE",
                role: "PR Director",
                dept: "Public Relations",
                image: "https://images.unsplash.com/photo-1580489944761-15a19d654956?w=500&auto=format&fit=crop&q=60",
                desc: "Elegant and extremely persuasive. Not technical at all.",
                eliminated: false,
                reason: "UNKNOWN - Will be revealed by mega cipher"
            },
            3: {
                name: "DR. ARIS THORNE",
                role: "Chief Data Scientist",
                dept: "Analytics Analytics",
                image: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=500&auto=format&fit=crop&q=60",
                desc: "Data-obsessed analyst. Has access to all employee records.",
                eliminated: false,
                reason: "His security credentials were stolen via external brute-force before the internal breach"
            },
            4: {
                name: "KAELEN CROSS",
                role: "Server Technician",
                dept: "Maintenance",
                image: "https://images.unsplash.com/photo-1522075469751-3a6694fb2f61?w=500&auto=format&fit=crop&q=60", 
                desc: "Maintains the cooling systems for the quantum cores.",
                eliminated: false,
                reason: "He was physically stationed at off-world data center Delta-9"
            }
        };

                const levels = [
            {
                id: 1,
                name: "QUANTUM ACCESS LOGS",
                description: "Decrypt vault access sequence using ROT13 cipher",
                fileName: "vault_access.enc",
                cipherText: "DHNAGHAPBER",
                cipherType: "ROT13",
                password: "QUANTUMCORE",
                hint1: "Look at the first letter of the cipher `D`. What is the 13th letter after it?",
                hint2: "It refers to the heart of the stolen AI's hardware.",
                hint3: "Combine the technology type with what it represents (the heart).",
                clue: "Surveillance footage shows NOVA BLACK's access card was used to ping the vault. However, during the exact minute of the breach, she was live on a cross-continental holocast giving the keynote address to 50,000 people. Her card was cloned. NOVA BLACK CLEARED.",
                suspect: 0,
                eliminates: 0,
                solution: "ROT13 decoded: DHNAGHAPBER → QUANTUMCORE"
            },
            {
                id: 2,
                name: "NEURAL LINK ARCHIVES",
                description: "Crack Caesar cipher from neural comm headers",
                fileName: "neural_comms.enc",
                cipherText: "JHQHVLVYLUXV",
                cipherType: "Caesar (Shift 3)",
                password: "GENESISVIRUS",
                hint1: "Caesar Cipher: Try shifts 1-10 until it makes sense.",
                hint2: "It relates to the stolen AI and a malicious program.",
                hint3: "Combine the name of the AI with the type of malicious software it became.",
                clue: "ELIAS VANCE's security override code was used to bypass the inner grid. But medical bay biometrics show he was undergoing mandatory neural implant maintenance during that entire 4-hour window. He was unconscious. ELIAS VANCE CLEARED.",
                suspect: 1,
                eliminates: 1,
                solution: "Caesar (Shift 3) decoded: JHQHVLVYLUXV → GENESISVIRUS"
            },
            {
                id: 3,
                name: "SECURITY MAINFRAME",
                description: "Decode Atbash cipher from security subroutines",
                fileName: "security_sub.enc",
                cipherText: "XBYVIWUVUMHV",
                cipherType: "Atbash (A↔Z, B↔Y)",
                password: "CYBERDEFENSE",
                hint1: "Atbash Cipher: Each letter maps backward in alphabet.",
                hint2: "It refers to the department that failed to stop the breach.",
                hint3: "Combine the prefix for digital systems with the department's primary function.",
                clue: "Analysis of DR. ARIS THORNE's terminal shows the breach originated from his network node. But external perimeter logs show his credentials were brute-forced by a Chinese megacorp proxy farm just seconds prior. He was the victim, not the attacker. DR. ARIS THORNE CLEARED.",
                suspect: 3,
                eliminates: 3,
                solution: "Atbash decoded: XBYVIWUVUMHV → CYBERDEFENSE"
            },
            {
                id: 4,
                name: "PERIMETER SHIELDS",
                description: "Solve Vigenère cipher from energy grid data",
                fileName: "shield_grid.enc",
                cipherText: "MIFBRBDYBMH",
                cipherType: "Vigenère (Key: NEON)",
                password: "ZEROEXPLOIT",
                hint1: "Vigenère Cipher: Uses a keyword to encrypt/decrypt.",
                hint2: "The keyword is NEON. It means a flaw with 0 days of warning.",
                hint3: "Combine the number of days of warning with the technical term for a software attack.",
                clue: "The heist required a physical manual bypass of the cooling rods by a maintenance tech. KAELEN CROSS was the only logged tech on duty. However, transport manifests prove he was actively repairing server racks at the off-world lunar facility Delta-9. KAELEN CROSS CLEARED.",
                suspect: 4,
                eliminates: 4,
                solution: "Vigenère (Key: NEON) decoded: MIFBRBDYBMH → ZEROEXPLOIT"
            }
        ];

        function startGame() {
            gameState.gameStarted = true;
            document.getElementById('introModal').classList.remove('active');
            showHome();
            updateTime();
            setInterval(updateTime, 1000);
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('timeDisplay').textContent = now.toLocaleTimeString();
        }

        function showHome() {
            const content = `
                <h1 style="text-shadow: 0 0 15px #00ff00;">⚡ CASE: NEON SHADOW ⚡</h1>
                
                <div class="clue-box">
                    <strong>INCIDENT REPORT:</strong><br><br>
                    At 02:47 AM standard time, the Genesis AI source code was stolen.
                    <br><br>
                    Attacker actions:<br>
                    • Bypassed quantum firewall layers<br>
                    • Extracted Genesis core logic (12 PB)<br>
                    • Wiped identity trackers<br>
                    • Encrypted access logs<br><br>
                    <strong>Status:</strong> <span style="color: #ff0000;">TRAITOR UNKNOWN</span>
                </div>

                <h2 style="margin-top: 30px;">Your Mission:</h2>
                <div class="clue-box" style="background: rgba(255, 0, 0, 0.1); border-left: 4px solid #ff0000;">
                    1. Decrypt 4 encrypted files using ciphers<br>
                    2. Eliminate suspects through forensic analysis<br>
                    3. Decode the MEGA CIPHER to reveal the hacker<br><br>
                    <strong style="color: #ffff00;">WARNING:</strong> You will NOT know who the hacker is until the final cipher is solved!
                </div>

                <div class="level-progress">
                    <div class="level-badge" onclick="showLevels()">1</div>
                    <div class="level-badge" onclick="showLevels()">2</div>
                    <div class="level-badge" onclick="showLevels()">3</div>
                    <div class="level-badge" onclick="showLevels()">4</div>
                    <div class="level-badge" onclick="showLevels()">5</div>
                </div>

                <div style="margin-top: 40px; text-align: center;">
                    <button class="btn" onclick="showLevels()" style="font-size: 16px; padding: 15px 30px;">START CRACKING CIPHERS</button>
                    <button class="btn" onclick="showSuspects()" style="font-size: 16px; padding: 15px 30px;">REVIEW SUSPECTS</button>
                </div>
            `;
            document.getElementById('contentArea').innerHTML = content;
        }

        function showInvestigation() {
            const content = `
                <h1>📊 INVESTIGATION STATUS</h1>
                
                <div class="timeline">
                    <div class="timestamp">02:47 AM - BREACH INITIATED</div>
                    Unauthorized access from internal network (192.168.x.x)
                </div>

                <div class="timeline">
                    <div class="timestamp">02:48 AM - AUTHENTICATION BYPASS</div>
                    Multi-factor authentication compromised
                </div>

                <div class="timeline">
                    <div class="timestamp">02:49 AM - PRIVILEGE ESCALATION</div>
                    Admin-level access granted
                </div>
