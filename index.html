<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPERATION: BREACH - Server Hack Mystery Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #000000;
            color: #00ff00;
            overflow: hidden;
            height: 100vh;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink {
            50% { border-right-color: transparent; }
        }

        @keyframes glitch {
            0%, 100% { text-shadow: 0 0 5px #00ff00; }
            50% { text-shadow: 0 0 15px #ff0000, 0 0 5px #00ffff; }
        }

        .typing-text {
            display: inline-block;
            text-align: left;
            border-right: 2px solid #00ff00;
            white-space: pre-wrap;
            word-wrap: break-word;
            animation: blink 0.75s step-end infinite;
        }

        .header-bar {
            background: #001a00;
            border-bottom: 2px solid #00ff00;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #00ff00;
            letter-spacing: 2px;
        }

        .time-display {
            font-size: 14px;
            padding: 5px 15px;
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #00ff00;
            border-radius: 3px;
        }

        .main-container {
            display: flex;
            height: calc(100vh - 45px);
        }

        .sidebar {
            width: 280px;
            background: #000000;
            border-right: 2px solid #00ff00;
            overflow-y: auto;
            padding: 15px;
        }

        .sidebar-item {
            padding: 12px;
            margin: 8px 0;
            background: rgba(0, 255, 0, 0.05);
            border: 1px solid #00ff00;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.3s;
            font-size: 13px;
        }

        .sidebar-item:hover {
            background: rgba(0, 255, 0, 0.2);
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        .sidebar-item.active {
            background: #00ff00;
            color: #000000;
            font-weight: bold;
        }

        .content-area {
            flex: 1;
            background: #000000;
            padding: 20px;
            overflow-y: auto;
            position: relative;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #001a00;
            border: 2px solid #00ff00;
            padding: 40px;
            border-radius: 10px;
            max-width: 900px;
            width: 90%;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.5);
            animation: slideIn 0.5s ease-out;
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-title {
            font-size: 32px;
            margin-bottom: 20px;
            text-shadow: 0 0 15px #00ff00;
            letter-spacing: 3px;
        }

        .modal-text {
            font-size: 16px;
            line-height: 1.8;
            margin: 20px 0;
        }

        .password-input {
            padding: 12px;
            margin: 20px 0;
            background: rgba(0, 255, 0, 0.05);
            border: 1px solid #00ff00;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            width: 100%;
            border-radius: 3px;
        }

        .password-input::placeholder {
            color: rgba(0, 255, 0, 0.5);
        }

        .btn {
            padding: 12px 30px;
            margin: 10px;
            background: rgba(0, 255, 0, 0.1);
            border: 2px solid #00ff00;
            color: #00ff00;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            border-radius: 3px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: #00ff00;
            color: #000000;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.8);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .clue-box {
            margin: 20px 0;
            padding: 20px;
            background: rgba(0, 150, 200, 0.1);
            border-left: 4px solid #00ff00;
            border-radius: 3px;
            font-size: 14px;
            line-height: 1.8;
            text-align: left;
        }

        .suspect-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .suspect-card {
            background: #001a00;
            border: 2px solid #00ff00;
            border-radius: 5px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }

        .suspect-card:hover {
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.8);
            transform: translateY(-5px);
        }

        .suspect-card.eliminated {
            opacity: 0.5;
            border: 2px solid #ff0000;
        }

        .suspect-image {
            width: 100%;
            height: 200px;
            background: #001a00;
            overflow: hidden;
            border-bottom: 2px solid #00ff00;
        }

        .suspect-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .suspect-info {
            padding: 15px;
            text-align: left;
        }

        .suspect-name {
            font-size: 18px;
            font-weight: bold;
            margin: 10px 0;
            color: #00ff00;
        }

        .suspect-role {
            font-size: 12px;
            color: rgba(0, 255, 0, 0.7);
            margin: 5px 0;
        }

        .suspect-status {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(0, 255, 0, 0.3);
            color: #00ff00;
            font-weight: bold;
            font-size: 12px;
        }

        .level-progress {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .level-badge {
            width: 50px;
            height: 50px;
            background: rgba(0, 255, 0, 0.1);
            border: 2px solid #00ff00;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .level-badge.completed {
            background: #00ff00;
            color: #000000;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.8);
        }

        .level-badge.locked {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .alert {
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
            font-weight: bold;
            animation: pulse 0.5s;
        }

        .alert.success {
            background: rgba(0, 255, 0, 0.2);
            border: 2px solid #00ff00;
            color: #00ff00;
        }

        .alert.error {
            background: rgba(255, 0, 0, 0.2);
            border: 2px solid #ff0000;
            color: #ff0000;
        }

        .alert.warning {
            background: rgba(255, 165, 0, 0.2);
            border: 2px solid #ffa500;
            color: #ffa500;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .cipher-display {
            background: rgba(0, 255, 0, 0.1);
            border: 2px solid #00ff00;
            padding: 20px;
            border-radius: 5px;
            margin: 15px 0;
            font-family: 'Courier New', monospace;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 3px;
        }

        .hint-section {
            background: rgba(255, 165, 0, 0.1);
            border-left: 4px solid #ffa500;
            padding: 15px;
            margin: 15px 0;
            border-radius: 3px;
            font-size: 13px;
            color: #ffa500;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ff00;
        }

        h2 {
            font-size: 20px;
            margin: 20px 0 10px 0;
            color: #00ffff;
        }

        .timeline {
            margin: 20px 0;
            padding: 15px;
            background: rgba(0, 100, 200, 0.1);
            border-left: 4px solid #00ffff;
            border-radius: 3px;
            text-align: left;
        }

        .timestamp {
            font-weight: bold;
            color: #ffff00;
            margin: 10px 0;
        }

        .evidence-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .evidence-card {
            background: rgba(0, 100, 200, 0.1);
            border: 2px solid #00ffff;
            border-radius: 5px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
        }

        .evidence-card:hover {
            box-shadow: 0 0 15px rgba(0, 200, 255, 0.5);
            transform: translateY(-5px);
        }

        .evidence-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #00ffff;
        }

        .password-hint {
            margin-top: 15px;
            padding: 15px;
            background: rgba(255, 165, 0, 0.1);
            border: 1px solid #ffa500;
            border-radius: 3px;
            font-size: 12px;
            color: #ffa500;
            text-align: left;
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #000000;
        }

        ::-webkit-scrollbar-thumb {
            background: #00ff00;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #00cc00;
        }
    </style>
</head>
<body>
    <div class="header-bar">
        <div class="title">⚠ OPERATION: BREACH ⚠</div>
        <div class="time-display" id="timeDisplay">00:00:00</div>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <div style="margin-bottom: 20px; font-weight: bold; text-shadow: 0 0 5px #00ff00; font-size: 14px;">
                ➤ NAVIGATION MENU
            </div>
            <div class="sidebar-item active" onclick="showHome()">🏠 HOME</div>
            <div class="sidebar-item" onclick="showInvestigation()">🔍 INVESTIGATION</div>
            <div class="sidebar-item" onclick="showSuspects()">👥 SUSPECTS</div>
            <div class="sidebar-item" onclick="showLevels()">🔐 CIPHER LEVELS</div>
            <div class="sidebar-item" onclick="showEvidence()">📋 EVIDENCE LOG</div>
            <div class="sidebar-item" onclick="showTimeline()">⏱ TIMELINE</div>
            <div class="sidebar-item" onclick="showMegaPuzzle()">🔓 MEGA CIPHER</div>
        </div>

        <div class="content-area" id="contentArea">
            <!-- Content dynamically loaded -->
        </div>
    </div>

    <!-- INTRO MODAL -->
    <div class="modal active" id="introModal">
        <div class="modal-content">
            <div class="modal-title">⚠ CRITICAL BREACH DETECTED ⚠</div>
            <div class="modal-text" style="min-height: 180px;">
                <div class="typing-text" id="introTextContainer"></div>
            </div>
            <button class="btn" id="startBtn" onclick="startGame()" style="margin-top: 30px; font-size: 16px; display: none;">▶ BEGIN INVESTIGATION</button>
        </div>
    </div>

    <!-- PASSWORD MODAL -->
    <div class="modal" id="passwordModal">
        <div class="modal-content">
            <div class="modal-title" id="passwordTitle">🔐 ENCRYPTED FILE</div>
            <div id="passwordPrompt" class="modal-text"></div>
            <div id="cipherInfo"></div>
            <input type="text" class="password-input" id="passwordInput" placeholder="Enter decrypted password...">
            <div id="hintContainer" style="display: none; margin-top: 20px; padding: 15px; border: 1px solid #ffa500; border-radius: 3px; background: rgba(255, 165, 0, 0.05); text-align: left;">
                <div style="color: #ffa500; font-weight: bold; margin-bottom: 10px;">⚠ ADMIN AUTHENTICATION REQUIRED FOR HINTS ⚠</div>
                <input type="text" class="password-input" id="adminPasswordInput" placeholder="Enter Admin Password..." style="border-color: #ffa500; color: #ffa500; margin-top: 0; margin-bottom: 10px;">
                <button class="btn" onclick="unlockHint()" style="background: rgba(255, 165, 0, 0.1); border: 2px solid #ffa500; color: #ffa500; width: 100%; margin: 0;">UNLOCK NEXT HINT</button>
                <div id="adminFeedback" style="color: #ff0000; margin-top: 10px; font-size: 14px;"></div>
                <div id="hintTextDisplay" style="margin-top: 15px;"></div>
            </div>
            <div id="actionButtons" style="margin-top: 20px;">
                <button class="btn" onclick="checkPassword()">DECRYPT</button>
                <button class="btn" onclick="closePasswordModal()">CANCEL</button>
                <button class="btn" onclick="toggleHint()" style="background: rgba(255, 165, 0, 0.1); border: 2px solid #ffa500; color: #ffa500;">HINTS</button>
            </div>
            <div id="nextLevelContainer" style="display: none; margin-top: 20px;">
                <button class="btn" onclick="goToNextLevel()" style="background: rgba(0, 255, 0, 0.2); border: 2px solid #00ff00; color: #00ff00; width: 100%;">NEXT LEVEL ➡</button>
            </div>
            <div id="passwordFeedback" style="margin-top: 15px; min-height: 30px;"></div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const introLines = [
                "Your company's main server has been compromised.",
                "A sophisticated attacker has infiltrated your network.",
                "You have 5 suspects. ONE of them is the hacker.",
                "Your mission: Crack ciphers and find the truth.",
                "WARNING: The attacker's identity remains UNKNOWN.",
                "Solve the final mega cipher to reveal who they are."
            ];
            
            const container = document.getElementById("introTextContainer");
            const btn = document.getElementById("startBtn");
            let currentLine = 0;
            let currentWord = 0;
            let words = introLines[currentLine].split(" ");
            
            const typeInterval = setInterval(() => {
                if (currentWord < words.length) {
                    container.textContent += (currentWord === 0 ? "" : " ") + words[currentWord];
                    currentWord++;
                } else {
                    currentLine++;
                    if (currentLine < introLines.length) {
                        words = introLines[currentLine].split(" ");
                        currentWord = 0;
                        container.textContent += "\n";
                    } else {
                        clearInterval(typeInterval);
                        btn.style.display = "inline-block";
                    }
                }
            }, 100);
        });

        const gameState = {
            currentLevel: 0,
            completedLevels: [],
            unlockedFiles: [],
            eliminatedSuspects: [],
            gameStarted: false,
            finalRevealed: false,
            hintsUsed: []
        };

        const characters = {
            0: {
                name: "MARCUS CHEN",
                role: "Senior Network Admin",
                dept: "Infrastructure",
                image: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=500&auto=format&fit=crop&q=60", // Stock: Professional Man
                desc: "Quiet, keeps to himself. Rarely in meetings.",
                eliminated: false,
                reason: "Fitness tracker confirms gym alibi during breach"
            },
            1: {
                name: "PAULA RODRIGUEZ",
                role: "Database Architect",
                dept: "Backend Systems",
                image: "https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=500&auto=format&fit=crop&q=60", // Stock: Professional Woman
                desc: "Always busy, hard to reach. Late night worker.",
                eliminated: false,
                reason: "Passport stamps confirm Brazil vacation dates"
            },
            2: {
                name: "DEVON PATEL",
                role: "Security Analyst",
                dept: "Cybersecurity",
                image: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=500&auto=format&fit=crop&q=60", // Stock: Young Man
                desc: "New hire, 3 months in. Very tech-savvy.",
                eliminated: false,
                reason: "TSA records confirm airport presence at breach time"
            },
            3: {
                name: "IRIS WAGNER",
                role: "Data Entry Specialist",
                dept: "Admin Support",
                image: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=500&auto=format&fit=crop&q=60", // Stock: Young Woman
                desc: "Been here 10 years. Very reliable and trustworthy.",
                eliminated: false,
                reason: "Multiple colleagues witnessed continuous presence at work"
            },
            4: {
                name: "ALEX TORRES",
                role: "Junior Developer",
                dept: "Development",
                image: "https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?w=500&auto=format&fit=crop&q=60", // Stock: Developer Man
                desc: "Quiet, introverted. Keeps coding. Unknown presence.",
                eliminated: false,
                reason: "UNKNOWN - Will be revealed by mega cipher"
            }
        };

        const levels = [
            {
                id: 1,
                name: "ACCESS LOGS",
                description: "Decrypt access logs using ROT13 cipher",
                fileName: "access_logs.enc",
                cipherText: "CEBTBPBY47",
                cipherType: "ROT13",
                password: "PROTOCOL47",
                hint1: "ROT13: Each letter shifts 13 positions forward.",
                hint2: "The SSH protocol is related to the password.",
                hint3: "SSH protocol + breach minute (47) = PROTOCOL47",
                clue: "Irregular IP found accessing from outside. Marcus Chen VPN login at breach time. But fitness tracker shows gym visit. MARCUS CHEN CLEARED.",
                suspect: 0,
                eliminates: 0,
                solution: "ROT13 decoded: CEBTBPBY47 → PROTOCOL47"
            },
            {
                id: 2,
                name: "EMAIL ARCHIVES",
                description: "Crack Caesar cipher from email headers",
                fileName: "email_archives.enc",
                cipherText: "PCXMFNRD2024",
                cipherType: "Caesar (Shift 5)",
                password: "EXCHANGE2024",
                hint1: "Caesar Cipher: Try shifts 1-25 until it makes sense.",
                hint2: "It relates to an email server software and the year 2024.",
                hint3: "Microsoft email software + 2024 = EXCHANGE2024",
                clue: "Paula Rodriguez out-of-office: Brazil vacation. Visa stamps confirm. Airline records verify. PAULA RODRIGUEZ CLEARED.",
                suspect: 1,
                eliminates: 1,
                solution: "Caesar (Shift 5) decoded: PCXMFNRD2024 → EXCHANGE2024"
            },
            {
                id: 3,
                name: "SYSTEM LOGS",
                description: "Decode Atbash cipher from system logs",
                fileName: "system_logs.enc",
                cipherText: "PVIRXOB64BRM",
                cipherType: "Atbash (A↔Z, B↔Y)",
                password: "KERNEL64BIT",
                hint1: "Atbash Cipher: Each letter maps backward in alphabet.",
                hint2: "It refers to the operating system core and its architecture.",
                hint3: "Operating system kernel + 64-bit architecture = KERNEL64BIT",
                clue: "Commands from Devon Patel's workstation. But cellular data shows LAX Airport. TSA confirms flight at 2:30 AM (before breach). DEVON PATEL CLEARED.",
                suspect: 2,
                eliminates: 2,
                solution: "Atbash decoded: PVIRXOB64BRM → KERNEL64BIT"
            },
            {
                id: 4,
                name: "FIREWALL RECORDS",
                description: "Solve Vigenère cipher from firewall data",
                fileName: "firewall_records.enc",
                cipherText: "FMTMO443YJM",
                cipherType: "Vigenère (Key: FIREWALL)",
                password: "TCPIP443SSL",
                hint1: "Vigenère Cipher: Uses a keyword to encrypt/decrypt.",
                hint2: "The keyword is FIREWALL. Think of networking protocols.",
                hint3: "TCP/IP + port 443 + SSL/TLS encryption = TCPIP443SSL",
                clue: "Breach from internal network. Iris Wagner present 12 hours continuously. 8 witnesses confirm. IRIS WAGNER CLEARED.",
                suspect: 3,
                eliminates: 3,
                solution: "Vigenère (Key: FIREWALL) decoded: FMTMO443YJM → TCPIP443SSL"
            }
        ];

        function startGame() {
            gameState.gameStarted = true;
            document.getElementById('introModal').classList.remove('active');
            showHome();
            updateTime();
            setInterval(updateTime, 1000);
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('timeDisplay').textContent = now.toLocaleTimeString();
        }

        function showHome() {
            const content = `
                <h1 style="text-shadow: 0 0 15px #00ff00;">⚠ CASE: OPERATION BREACH ⚠</h1>
                
                <div class="clue-box">
                    <strong>INCIDENT REPORT:</strong><br><br>
                    At 02:47 AM on March 17, 2026, unauthorized server access detected.
                    <br><br>
                    Attacker actions:<br>
                    • Extracted customer database (2.3 GB)<br>
                    • Stole financial records (800 MB)<br>
                    • Installed persistent backdoor<br>
                    • Encrypted system logs<br><br>
                    <strong>Status:</strong> <span style="color: #ff0000;">HACKER STILL UNKNOWN</span>
                </div>

                <h2 style="margin-top: 30px;">Your Mission:</h2>
                <div class="clue-box" style="background: rgba(255, 0, 0, 0.1); border-left: 4px solid #ff0000;">
                    1. Decrypt 4 encrypted files using ciphers<br>
                    2. Eliminate suspects through forensic analysis<br>
                    3. Decode the MEGA CIPHER to reveal the hacker<br><br>
                    <strong style="color: #ffff00;">WARNING:</strong> You will NOT know who the hacker is until the final cipher is solved!
                </div>

                <div class="level-progress">
                    <div class="level-badge" onclick="showLevels()">1</div>
                    <div class="level-badge" onclick="showLevels()">2</div>
                    <div class="level-badge" onclick="showLevels()">3</div>
                    <div class="level-badge" onclick="showLevels()">4</div>
                    <div class="level-badge" onclick="showLevels()">5</div>
                </div>

                <div style="margin-top: 40px; text-align: center;">
                    <button class="btn" onclick="showLevels()" style="font-size: 16px; padding: 15px 30px;">START CRACKING CIPHERS</button>
                    <button class="btn" onclick="showSuspects()" style="font-size: 16px; padding: 15px 30px;">REVIEW SUSPECTS</button>
                </div>
            `;
            document.getElementById('contentArea').innerHTML = content;
        }

        function showInvestigation() {
            const content = `
                <h1>📊 INVESTIGATION STATUS</h1>
                
                <div class="timeline">
                    <div class="timestamp">02:47 AM - BREACH INITIATED</div>
                    Unauthorized access from internal network (192.168.x.x)
                </div>

                <div class="timeline">
                    <div class="timestamp">02:48 AM - AUTHENTICATION BYPASS</div>
                    Multi-factor authentication compromised
                </div>

                <div class="timeline">
                    <div class="timestamp">02:49 AM - PRIVILEGE ESCALATION</div>
                    Admin-level access granted
                </div>

                <div class="timeline">
                    <div class="timestamp">02:52 AM - DATA EXFILTRATION</div>
                    2.3 GB customer data + 800 MB financial records transferred
                </div>

                <div class="timeline">
                    <div class="timestamp">03:05 AM - BACKDOOR INSTALLATION</div>
                    Persistent remote access mechanism deployed
                </div>

                <div class="timeline">
                    <div class="timestamp">03:15 AM - LOG ENCRYPTION</div>
                    System logs encrypted and partially overwritten
                </div>

                <div class="timeline">
